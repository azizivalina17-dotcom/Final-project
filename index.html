<style>
html { scroll-behavior: smooth; }
/* Hexagon shape using clip-path */

/* Hexagon with sharp top and bottom points */
.hexagon {
  clip-path: polygon(
    50% 0%,    /* top point */
    93% 25%,   /* top-right */
    93% 75%,   /* bottom-right */
    50% 100%,  /* bottom point */
    7% 75%,    /* bottom-left */
    7% 25%     /* top-left */
  );
}

/* Glowing cyan shadow */
.shadow-glow {
  box-shadow: 0 0 20px rgba(14, 165, 233, 0.7), 0 0 40px rgba(14, 165, 233, 0.5);
}

</style>
